<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="900" height="1100" font-family="'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff057c"/>
      <stop offset="48%" style="stop-color:#7c64d5"/>
      <stop offset="100%" style="stop-color:#4cc3ff"/>
    </linearGradient>
    <linearGradient id="barBefore" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="barAfter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26de81"/>
      <stop offset="100%" style="stop-color:#20bf6b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="1100" fill="#0d0d1a"/>

  <!-- Header gradient bar -->
  <rect width="900" height="120" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="450" y="52" text-anchor="middle" fill="white" font-size="26" font-weight="bold">作品集網站效能優化報告</text>
  <text x="450" y="82" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="15">Tony Cheng Portfolio  ·  abonla.github.io/web_portfolio</text>
  <text x="450" y="106" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-size="13">優化日期：2026-04-13  ·  4 項修正  ·  3 commits</text>

  <!-- ── SECTION 1: 問題診斷 ── -->
  <text x="50" y="155" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">BEFORE  ·  問題診斷</text>
  <line x1="50" y1="160" x2="850" y2="160" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Problem cards -->
  <!-- Card 1 -->
  <rect x="50" y="170" width="255" height="95" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <rect x="50" y="170" width="6" height="95" rx="3" fill="#ff6b6b"/>
  <text x="70" y="195" fill="#ff6b6b" font-size="28" font-weight="bold">01</text>
  <text x="70" y="218" fill="white" font-size="13" font-weight="bold">縮圖未壓縮</text>
  <text x="70" y="236" fill="#aaa" font-size="11">226 張縮圖，最大 653 KB</text>
  <text x="70" y="252" fill="#aaa" font-size="11">總下載量高達 32 MB</text>

  <!-- Card 2 -->
  <rect x="323" y="170" width="255" height="95" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <rect x="323" y="170" width="6" height="95" rx="3" fill="#f7b731"/>
  <text x="343" y="195" fill="#f7b731" font-size="28" font-weight="bold">02</text>
  <text x="343" y="218" fill="white" font-size="13" font-weight="bold">Masonry 重排過多</text>
  <text x="343" y="236" fill="#aaa" font-size="11">每張圖觸發一次排版計算</text>
  <text x="343" y="252" fill="#aaa" font-size="11">載入時高達 200+ 次重排</text>

  <!-- Card 3 -->
  <rect x="596" y="170" width="255" height="95" rx="10" fill="#1a1a2e" filter="url(#shadow)"/>
  <rect x="596" y="170" width="6" height="95" rx="3" fill="#4cc3ff"/>
  <text x="616" y="195" fill="#4cc3ff" font-size="28" font-weight="bold">03</text>
  <text x="616" y="218" fill="white" font-size="13" font-weight="bold">YouTube 影片空白</text>
  <text x="616" y="236" fill="#aaa" font-size="11">53 個 iframe 同時請求</text>
  <text x="616" y="252" fill="#aaa" font-size="11">file:// 協定被 YouTube 封鎖</text>

  <!-- ── SECTION 2: 縮圖壓縮 Bar Chart ── -->
  <text x="50" y="305" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">FIX 01  ·  縮圖批次壓縮</text>
  <line x1="50" y1="310" x2="850" y2="310" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Chart area -->
  <rect x="50" y="320" width="530" height="175" rx="10" fill="#1a1a2e"/>

  <!-- Chart title -->
  <text x="70" y="345" fill="white" font-size="13" font-weight="bold">縮圖總大小對比（MB）</text>

  <!-- Y-axis labels -->
  <text x="68" y="393" fill="#888" font-size="11" text-anchor="end">32</text>
  <text x="68" y="430" fill="#888" font-size="11" text-anchor="end">20</text>
  <text x="68" y="467" fill="#888" font-size="11" text-anchor="end">12</text>
  <text x="68" y="484" fill="#888" font-size="11" text-anchor="end">0</text>

  <!-- Grid lines -->
  <line x1="75" y1="390" x2="565" y2="390" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="4"/>
  <line x1="75" y1="427" x2="565" y2="427" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="4"/>
  <line x1="75" y1="464" x2="565" y2="464" stroke="#2a2a4a" stroke-width="1" stroke-dasharray="4"/>
  <line x1="75" y1="481" x2="565" y2="481" stroke="#333" stroke-width="1"/>

  <!-- Before bar (32 MB → 91px tall) -->
  <rect x="140" y="390" width="80" height="91" rx="4" fill="url(#barBefore)"/>
  <text x="180" y="383" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">32 MB</text>
  <text x="180" y="493" text-anchor="middle" fill="#aaa" font-size="11">壓縮前</text>

  <!-- After bar (12 MB → 34px tall) -->
  <rect x="260" y="447" width="80" height="34" rx="4" fill="url(#barAfter)"/>
  <text x="300" y="440" text-anchor="middle" fill="#26de81" font-size="14" font-weight="bold">12 MB</text>
  <text x="300" y="493" text-anchor="middle" fill="#aaa" font-size="11">壓縮後</text>

  <!-- Arrow -->
  <text x="230" y="460" fill="#a78bfa" font-size="22">→</text>

  <!-- Single file comparison -->
  <text x="410" y="345" fill="white" font-size="12" font-weight="bold">單張最大縮圖</text>
  <rect x="390" y="355" width="50" height="90" rx="4" fill="url(#barBefore)" opacity="0.9"/>
  <text x="415" y="350" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold">653 KB</text>
  <rect x="460" y="421" width="50" height="24" rx="4" fill="url(#barAfter)" opacity="0.9"/>
  <text x="485" y="416" text-anchor="middle" fill="#26de81" font-size="10" font-weight="bold">~70 KB</text>
  <text x="415" y="458" text-anchor="middle" fill="#aaa" font-size="10">前</text>
  <text x="485" y="458" text-anchor="middle" fill="#aaa" font-size="10">後</text>

  <!-- Reduction badge -->
  <rect x="390" y="460" width="125" height="25" rx="12" fill="#20bf6b22"/>
  <text x="452" y="477" text-anchor="middle" fill="#26de81" font-size="12" font-weight="bold">▼ 降低 89%</text>

  <!-- Stats on right -->
  <rect x="595" y="320" width="255" height="175" rx="10" fill="#1a1a2e"/>
  <text x="722" y="352" text-anchor="middle" fill="#a78bfa" font-size="12">工具與參數</text>
  <line x1="615" y1="358" x2="835" y2="358" stroke="#2a2a4a" stroke-width="1"/>
  <text x="615" y="378" fill="#888" font-size="11">語言</text>
  <text x="835" y="378" text-anchor="end" fill="white" font-size="11">Python 3.10 + Pillow</text>
  <text x="615" y="400" fill="#888" font-size="11">壓縮品質</text>
  <text x="835" y="400" text-anchor="end" fill="white" font-size="11">JPEG quality = 70</text>
  <text x="615" y="422" fill="#888" font-size="11">最大寬度</text>
  <text x="835" y="422" text-anchor="end" fill="white" font-size="11">600 px</text>
  <text x="615" y="444" fill="#888" font-size="11">處理檔案數</text>
  <text x="835" y="444" text-anchor="end" fill="white" font-size="11">246 個縮圖</text>
  <text x="615" y="466" fill="#888" font-size="11">PNG 轉 JPEG</text>
  <text x="835" y="466" text-anchor="end" fill="#26de81" font-size="11">無透明度者自動轉換</text>
  <line x1="615" y1="474" x2="835" y2="474" stroke="#2a2a4a" stroke-width="1"/>
  <text x="615" y="490" fill="#888" font-size="11">總節省容量</text>
  <text x="835" y="490" text-anchor="end" fill="#26de81" font-size="13" font-weight="bold">20 MB（-62%）</text>

  <!-- ── SECTION 3: Masonry Debounce ── -->
  <text x="50" y="520" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">FIX 02  ·  Masonry 排版 Debounce</text>
  <line x1="50" y1="525" x2="850" y2="525" stroke="#2a2a4a" stroke-width="1"/>

  <rect x="50" y="535" width="390" height="140" rx="10" fill="#1a1a2e"/>
  <text x="70" y="560" fill="white" font-size="12" font-weight="bold">排版計算次數（頁面載入期間）</text>

  <!-- Before: tall bar -->
  <rect x="100" y="580" width="60" height="70" rx="4" fill="url(#barBefore)"/>
  <text x="130" y="575" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="bold">200+</text>
  <text x="130" y="663" text-anchor="middle" fill="#aaa" font-size="10">修正前</text>

  <text x="196" y="618" fill="#a78bfa" font-size="20">→</text>

  <!-- After: tiny bar -->
  <rect x="220" y="636" width="60" height="14" rx="4" fill="url(#barAfter)"/>
  <text x="250" y="629" text-anchor="middle" fill="#26de81" font-size="12" font-weight="bold">&lt; 5</text>
  <text x="250" y="663" text-anchor="middle" fill="#aaa" font-size="10">修正後</text>

  <text x="315" y="580" fill="#888" font-size="10">原理：200 ms debounce</text>
  <text x="315" y="598" fill="#888" font-size="10">將多個事件批次合併</text>
  <text x="315" y="616" fill="#888" font-size="10">成一次排版呼叫</text>
  <rect x="300" y="628" width="125" height="22" rx="11" fill="#ff6b6b22"/>
  <text x="362" y="643" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">▼ 降低 97%+</text>

  <!-- ── SECTION 4: YouTube Facade ── -->
  <rect x="460" y="535" width="390" height="140" rx="10" fill="#1a1a2e"/>
  <text x="480" y="560" fill="white" font-size="12" font-weight="bold">FIX 03 + 04  ·  YouTube Facade 模式</text>
  <line x1="470" y1="566" x2="840" y2="566" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Before -->
  <text x="480" y="586" fill="#ff6b6b" font-size="11" font-weight="bold">修正前</text>
  <text x="480" y="603" fill="#888" font-size="10">53 個 &lt;iframe&gt; 同時載入</text>
  <text x="480" y="618" fill="#888" font-size="10">→ 53 條 YouTube 外部連線</text>
  <text x="480" y="633" fill="#888" font-size="10">→ file:// 被拒絕，影片空白</text>
  <text x="480" y="648" fill="#888" font-size="10">→ 點擊後高度變化，整頁跑版</text>

  <!-- Arrow down -->
  <text x="760" y="610" fill="#a78bfa" font-size="28" font-weight="bold">↓</text>

  <!-- After -->
  <text x="480" y="668" fill="#26de81" font-size="11" font-weight="bold">修正後</text>
  <!-- green bullets -->
  <circle cx="490" cy="676" r="3" fill="#26de81"/>
  <text x="498" y="679" fill="#aaa" font-size="10">縮圖 + 播放按鈕（~5 KB/張）</text>
  <circle cx="490" cy="691" r="3" fill="#26de81"/>
  <text x="498" y="694" fill="#aaa" font-size="10">點擊才插入 iframe（autoplay）</text>
  <circle cx="490" cy="706" r="3" fill="#26de81"/>
  <text x="498" y="709" fill="#aaa" font-size="10">padding-bottom: 56.25% 固定比例，不跑版</text>

  <!-- ── SECTION 5: Summary ── -->
  <text x="50" y="710" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">AFTER  ·  優化成果總覽</text>
  <line x1="50" y1="715" x2="850" y2="715" stroke="#2a2a4a" stroke-width="1"/>

  <!-- 4 metric cards -->
  <!-- Card A -->
  <rect x="50" y="725" width="190" height="110" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="145" y="768" text-anchor="middle" fill="#26de81" font-size="36" font-weight="bold">62%</text>
  <text x="145" y="792" text-anchor="middle" fill="white" font-size="12">縮圖總下載量減少</text>
  <text x="145" y="810" text-anchor="middle" fill="#888" font-size="11">32 MB → 12 MB</text>
  <text x="145" y="828" text-anchor="middle" fill="#888" font-size="10">246 個縮圖</text>

  <!-- Card B -->
  <rect x="258" y="725" width="190" height="110" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="353" y="768" text-anchor="middle" fill="#26de81" font-size="36" font-weight="bold">89%</text>
  <text x="353" y="792" text-anchor="middle" fill="white" font-size="12">單張最大縮圖縮小</text>
  <text x="353" y="810" text-anchor="middle" fill="#888" font-size="11">653 KB → ~70 KB</text>
  <text x="353" y="828" text-anchor="middle" fill="#888" font-size="10">quality = 70</text>

  <!-- Card C -->
  <rect x="466" y="725" width="190" height="110" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="561" y="768" text-anchor="middle" fill="#4cc3ff" font-size="36" font-weight="bold">0</text>
  <text x="561" y="792" text-anchor="middle" fill="white" font-size="12">載入時 YouTube 連線</text>
  <text x="561" y="810" text-anchor="middle" fill="#888" font-size="11">原本 53 條 → 0 條</text>
  <text x="561" y="828" text-anchor="middle" fill="#888" font-size="10">Facade 模式</text>

  <!-- Card D -->
  <rect x="674" y="725" width="190" height="110" rx="12" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="769" y="768" text-anchor="middle" fill="#f7b731" font-size="36" font-weight="bold">97%</text>
  <text x="769" y="792" text-anchor="middle" fill="white" font-size="12">Masonry 重排次數降低</text>
  <text x="769" y="810" text-anchor="middle" fill="#888" font-size="11">200+ 次 → &lt; 5 次</text>
  <text x="769" y="828" text-anchor="middle" fill="#888" font-size="10">200ms debounce</text>

  <!-- ── SECTION 6: Timeline ── -->
  <text x="50" y="870" fill="#a78bfa" font-size="13" font-weight="bold" letter-spacing="2">TIMELINE  ·  提交記錄</text>
  <line x1="50" y1="875" x2="850" y2="875" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Timeline line -->
  <line x1="100" y1="960" x2="800" y2="960" stroke="#2a2a4a" stroke-width="2"/>

  <!-- Dot 1 -->
  <circle cx="200" cy="960" r="10" fill="#7c64d5"/>
  <circle cx="200" cy="960" r="5" fill="white"/>
  <text x="200" y="943" text-anchor="middle" fill="#a78bfa" font-size="10">375e43a</text>
  <text x="200" y="984" text-anchor="middle" fill="white" font-size="10" font-weight="bold">縮圖壓縮</text>
  <text x="200" y="998" text-anchor="middle" fill="#888" font-size="9">+ Masonry debounce</text>

  <!-- Dot 2 -->
  <circle cx="450" cy="960" r="10" fill="#7c64d5"/>
  <circle cx="450" cy="960" r="5" fill="white"/>
  <text x="450" y="943" text-anchor="middle" fill="#a78bfa" font-size="10">1c45f84</text>
  <text x="450" y="984" text-anchor="middle" fill="white" font-size="10" font-weight="bold">YouTube Facade</text>
  <text x="450" y="998" text-anchor="middle" fill="#888" font-size="9">53 iframe → 縮圖</text>

  <!-- Dot 3 -->
  <circle cx="700" cy="960" r="10" fill="#26de81"/>
  <circle cx="700" cy="960" r="5" fill="white"/>
  <text x="700" y="943" text-anchor="middle" fill="#26de81" font-size="10">20aeaa6</text>
  <text x="700" y="984" text-anchor="middle" fill="white" font-size="10" font-weight="bold">跑版修正</text>
  <text x="700" y="998" text-anchor="middle" fill="#888" font-size="9">56.25% 容器定高</text>

  <!-- Footer -->
  <rect x="0" y="1060" width="900" height="40" fill="url(#headerGrad)" opacity="0.3"/>
  <text x="450" y="1084" text-anchor="middle" fill="#888" font-size="11">abonla.github.io/web_portfolio  ·  Optimized 2026-04-13  ·  Generated by Claude Code</text>
</svg>
